<script>
// ═══════════════════════════════════════════════════
// MOTOR DE CÁLCULO
// ═══════════════════════════════════════════════════
const san=v=>parseFloat(String(v||0).replace(',','.'))||0;
const fmt=(n,d=2)=>isNaN(n)?'—':Number(n).toFixed(d);

function calcTanque(tank, ftOverride){
  const mi=san(tank.mi), mf=san(tank.mf), fac=san(ftOverride!=null?ftOverride:tank.ft)||2.4;
  const th=san(tank.th)||1, red=san(tank.reductor);
  const ays=san(tank.aysPct), dh=san(tank.dilHora);
  const dif=Math.max(0,mf-mi);
  const bph=Math.max(0,(dif*fac-red)/th);
  const bpd=bph*24, dilDia=dh*24;
  const aysBls=bpd*(ays/100);
  const netos=Math.max(0,bpd-dilDia-aysBls);
  return{dif,bph,bpd,dilDia,aysBls,netos};
}

function calcAGA3(g){
  const pf=san(g.pf),hw=san(g.hw),T=san(g.tGas)||60;
  const Gg=san(g.gg)||0.65,d=san(g.diam)||2;
  // AGA-3 / API 14.3: Meter Run D — diámetro interno real del tubo de medición
  const D=san(g.meterRun)||0;
  const beta=(D>0&&d>0)?Math.min(d/D,0.75):0; // β = d/D, clamp a 0.75 (AGA-3 Sec.3)
  const Fc=(D>0)?1/(1-Math.pow(beta,4)):1;     // Factor de velocidad de aproximación
  const Fb=218.527*d*d*Fc,Fg=Math.sqrt(1/Gg),Ftf=Math.sqrt(520/(T+460));
  const qg=Math.max(0,(Fb*Fg*Ftf*Math.sqrt(Math.max(0,hw*pf)))/1000);
  return{Fb:Fb.toFixed(2),Fg:Fg.toFixed(4),Ftf:Ftf.toFixed(4),Fpv:'1.0000',
         beta:beta.toFixed(4),Fc:Fc.toFixed(4),qg};
}

function checkAl(pCab,pozo){
  const al=[];
  if(san(pCab)>san(pozo.limResorte))
    al.push({tipo:'RESORTE',nivel:'CRÍTICO',msg:`Presión cabezal ${pCab} psi > límite ${pozo.limResorte} psi`});
  return al;
}

function defaultForm(pozo){
  // una entrada por tanque
  const ftDefault=pozo.ft||pozo.factorTanque||'2.40';
  const tanks=(pozo.tanques||[{id:'t1',nombre:'Tanque 1',mi:'0',ft:ftDefault}]).map(t=>({
    id:t.id, nombre:t.nombre, mi:t.mi, ft:t.ft||ftDefault, mf:'', th:'1', reductor:'0', reductorTocado:false,
    aysPct:'2.4', dilHora:'1.05', apiXp:'9.80', apiDil:'18.40', factorEspuma:'0'
  }));
  return{
    tanks,
    sumar:tanks.length>1,
    pCab:'',pSep:'',torque:'',rpm:'',amp:'',
    pf:'',hw:'',tGas:'',gg:'0.65',diam:'2',meterRun:'',
  };
}

// DOM HELPERS
// ═══════════════════════════════════════════════════
const e=(t,a={})=>{
  const el=document.createElement(t);
  Object.entries(a).forEach(([k,v])=>{
    if(k==='cls')el.className=v;
    else if(k==='html')el.innerHTML=v;
    else if(k==='click')el.addEventListener('click',v);
    else if(k==='change')el.addEventListener('change',v);
    else if(k==='input')el.addEventListener('input',v);
    else if(k==='style')el.style.cssText=v;
    else el[k]=v;
  });
  return el;
};
const txt=s=>document.createTextNode(String(s??''));
function ap(p,...ch){ch.forEach(c=>{if(c!=null&&c!==false)p.appendChild(typeof c==='string'?txt(c):c)});return p;}

function field(label,value,onInput,{unit='',locked=false,alert=false,hint='',type='text',ph='0'}={}){
  const wrap=e('div');
  ap(wrap,e('label',{cls:'lbl',html:label}));
  const row=e('div',{style:'position:relative'});
  const inp=e('input',{cls:'inp'+(alert?' inp-alert':'')+(locked?' inp-locked':''),
    type,value:value??'',placeholder:ph,
    input:ev=>onInput(ev.target.value)});
  if(locked)inp.readOnly=true;
  ap(row,inp);
  if(unit)ap(row,e('span',{style:'position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:11px;color:#6b7280;pointer-events:none',html:unit}));
  if(locked)ap(row,e('span',{style:'position:absolute;right:unit?38:10px;top:50%;transform:translateY(-50%);font-size:12px;opacity:.4',html:'🔒'}));
  ap(wrap,row);
  if(hint)ap(wrap,e('span',{style:'font-size:10px;color:#4b5563;margin-top:3px;display:block',html:hint}));
  return wrap;
}

function cbox(label,value,unit='',hl=false,dim=false){
  const d=e('div',{cls:'cbox'+(hl?' cbox-hl':'')});
  ap(d,e('div',{style:'font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px',html:label}));
  ap(d,e('div',{cls:'v'+(hl?' v-hl':dim?' v-dim':''),html:value}));
  if(unit)ap(d,e('div',{cls:'unit',html:unit}));
  return d;
}

function badge(label,type='gray'){return e('span',{cls:'bdg bdg-'+type,html:label});}

function statusBadge(estado){
  const m={EN_CURSO:['g','● EN CURSO'],PENDIENTE:['a','⏳ PENDIENTE'],OFICIAL:['b','✓ OFICIAL'],CERRADA:['gray','— CERRADA']};
  const[c,l]=m[estado]||['gray',estado];return badge(l,c);
}

function sectionHdr(icon,title,sub=''){
  const d=e('div',{cls:'sechdr'});
  ap(d,e('div',{cls:'secico',html:icon}));
  const t=e('div');
  ap(t,e('div',{style:'font-size:13px;font-weight:700;color:#e2e8f0',html:title}));
  if(sub)ap(t,e('div',{style:'font-size:11px;color:#6b7280;margin-top:2px',html:sub}));
  ap(d,t);return d;
}

function alerts(als){
  if(!als||!als.length)return null;
  const wrap=e('div');
  als.forEach(a=>{
    const d=e('div',{cls:a.nivel==='CRÍTICO'?'alert-c':'alert-w'});
    ap(d,e('span',{style:'font-size:18px;flex-shrink:0',html:a.nivel==='CRÍTICO'?'🚨':'⚠️'}));
    const info=e('div');
    ap(info,e('div',{style:'font-size:11px;font-weight:700;color:'+(a.nivel==='CRÍTICO'?'#f87171':'#fbbf24'),html:a.nivel+' — '+a.tipo}));
    ap(info,e('div',{style:'font-size:12px;color:#d1d5db;margin-top:2px',html:a.msg}));
    ap(d,info);ap(wrap,d);
  });
  return wrap;
}

// ═══════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════
function buildDashboard(){
  const sc=e('div',{cls:'screen active'});
  const wrap=e('div',{cls:'wrap'});

  const right=e('div',{style:'display:flex;align-items:center;gap:6px'});
  ap(right,
    e('span',{style:'width:7px;height:7px;border-radius:50%;background:#10b981;display:inline-block'}),
    e('span',{style:'font-size:11px;color:#6b7280',html:'Sync'})
  );
  ap(wrap,topbar('Mis Pozos',S.user?.nombre+' · '+S.user?.zona,null,right));

  // Nota de rol
  const roleNote=e('div',{style:'background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:11px;color:#a5b4fc'});
  ap(roleNote,e('span',{html:'🔒 Configuración de pozos: solo Supervisor de Campo, Supervisor Mayor y Coordinador'}));
  ap(wrap,roleNote);

  POZOS.forEach(p=>{
    const card=e('button',{cls:'pcard '+(p.estado==='EN_CURSO'?'pcard-on':''),click:()=>{
      set({pozo:p,lecturas:[],form:defaultForm(p),screen:'REGISTRO'});
    }});
    const hdr=e('div',{style:'display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px'});
    const titW=e('div');
    ap(titW,
      e('div',{style:'font-size:17px;font-weight:700;color:#f1f5f9;font-family:monospace',html:p.nombre}),
      e('div',{style:'font-size:11px;color:#6b7280;margin-top:2px',html:p.campo+' · '+p.zona+' · '+p.tanques.length+' tanque'+(p.tanques.length>1?'s':'')})
    );
    ap(hdr,titW,statusBadge(p.estado));
    const grid=e('div',{cls:'g3'});
    [{l:'Netos/Día',v:fmt(p.netos),u:'Bls',amber:true},{l:'P.Cabezal',v:p.pCab,u:'psi'},{l:'Amp',v:p.amp,u:'A'}].forEach(({l,v,u,amber})=>{
      const box=e('div',{style:'background:rgba(255,255,255,.03);border:1px solid #1f2937;border-radius:8px;padding:8px 10px'});
      ap(box,
        e('div',{style:'font-size:10px;color:#6b7280',html:l}),
        e('div',{style:'font-size:14px;font-weight:700;color:'+(amber?'#f59e0b':'#e2e8f0')+';font-family:monospace;margin-top:2px',html:v}),
        e('div',{style:'font-size:10px;color:#4b5563',html:u})
      );
      ap(grid,box);
    });
    ap(card,hdr,grid);ap(wrap,card);
  });

  const foot=e('div',{style:'margin-top:16px;padding:10px 14px;background:rgba(255,255,255,.02);border:1px solid #1f2937;border-radius:10px;text-align:center;font-size:11px;color:#374151'});
  ap(foot,txt('🔒 Offline-first · Datos locales sincronizados'));
  ap(wrap,foot);ap(sc,wrap);return sc;
}

// ═══════════════════════════════════════════════════
// NUEVO POZO (solo Supervisores)
// ═══════════════════════════════════════════════════
function buildNuevo(){
  const sc=e('div',{cls:'screen active'});
  const wrap=e('div',{cls:'wrap'});
  ap(wrap,topbar('Configurar Pozo','Solo Supervisores y Coordinador',()=>go('DASHBOARD')));

  let nd=S.nuevoPozoData;
  function syncNd(k,v){S.nuevoPozoData={...S.nuevoPozoData,[k]:v};nd=S.nuevoPozoData;rebuildNuevo();}
  function syncTank(idx,k,v){
    const ts=[...S.nuevoPozoData.tanques];ts[idx]={...ts[idx],[k]:v};
    S.nuevoPozoData={...S.nuevoPozoData,tanques:ts};nd=S.nuevoPozoData;rebuildNuevo();
  }

  function rebuildNuevo(){
    const old=document.getElementById('nuevo-body');
    if(old){old.replaceWith(buildNuevoBody());}
  }

  function buildNuevoBody(){
    const body=e('div',{id:'nuevo-body'});

    // Rol notice
    const rn=e('div',{style:'background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2);border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:8px'});
    ap(rn,
      e('span',{style:'font-size:14px',html:'🛡️'}),
      e('div',{},[
        e('div',{style:'font-size:11px;font-weight:700;color:#a5b4fc',html:'Acceso restringido'}),
        e('div',{style:'font-size:10px;color:#6366f1;margin-top:2px',html:'Supervisor Campo · Supervisor Mayor · Coordinador'})
      ].reduce((p,c)=>{ap(p,c);return p;},e('div')))
    );
    ap(body,rn);

    // Identificación
    const c1=e('div',{cls:'card'});
    ap(c1,sectionHdr('🏗️','Identificación del Pozo'));
    ap(c1,field('Nombre del Pozo',nd.nombre,v=>syncNd('nombre',v),{hint:'Ej: MFB-950'}));
    ap(c1,e('div',{style:'height:10px'}));
    const g1=e('div',{cls:'g2'});
    ap(g1,field('Campo',nd.campo,v=>syncNd('campo',v),{hint:'Ej: Bare'}));
    const zWrap=e('div');
    ap(zWrap,e('label',{cls:'lbl',html:'Zona'}));
    const zSel=e('select',{cls:'inp',change:ev=>syncNd('zona',ev.target.value)});
    ['FAJA','MONAGAS'].forEach(z=>{const o=e('option',{value:z,html:z});if(nd.zona===z)o.selected=true;ap(zSel,o);});
    ap(zWrap,zSel);ap(g1,zWrap);
    ap(c1,g1);ap(body,c1);

    // Parámetros
    const c2=e('div',{cls:'card'});
    ap(c2,sectionHdr('🛢️','Parámetros del Tanque'));
    const g2=e('div',{cls:'g2'});
    ap(g2,field('Horas de Evaluación',nd.horas,v=>syncNd('horas',v),{unit:'H'}));
    ap(c2,g2);ap(body,c2);

    // Tanques con medida inicial
    const c3=e('div',{cls:'card'});
    ap(c3,sectionHdr('🪣','Tanques y Medida Inicial',`${nd.tanques.length} tanque(s) configurado(s)`));
    ap(c3,e('div',{style:'font-size:11px;color:#6b7280;margin-bottom:12px',html:'La medida inicial refleja el remanente o intransegable antes de iniciar operaciones.'}));

    nd.tanques.forEach((tank,idx)=>{
      const tb=e('div',{cls:'tank-block'});
      const th=e('div',{cls:'tank-hdr'});
      ap(th,e('div',{style:'font-size:12px;font-weight:700;color:#e2e8f0',html:'🪣 '+tank.nombre}));
      if(nd.tanques.length>1){
        const delBtn=e('button',{cls:'btn-r',html:'✕ Eliminar',click:()=>{

    // Alertas

    ap(c4,g4);ap(body,c4);

    const valid=nd.nombre&&nd.tanques.every(t=>t.mi!==''&&t.ft!=='');
    const confBtn=e('button',{cls:'btn btn-p',html:valid?'Iniciar Evaluación →':'Complete todos los campos requeridos',disabled:!valid,
      click:()=>{

        set({pozo:newPozo,lecturas:[],form:defaultForm(newPozo),screen:'REGISTRO'});
      }
    });
    ap(body,confBtn);
    return body;
  }

  ap(wrap,buildNuevoBody());ap(sc,wrap);return sc;
}

// ═══════════════════════════════════════════════════
// REGISTRO — Patch quirúrgico (sin perder foco)
// setForm() actualiza estado sin llamar render()
// patchCalcBoxes() actualiza solo los nodos de cálculo por ID
// switchTab() reemplaza solo el contenido de la pestaña activa
// ═══════════════════════════════════════════════════

function setForm(updater) {
  // Muta S.form en lugar de crear un objeto nuevo con spread
  // Esto garantiza que NO se llama render() y el foco se mantiene
  S.form = updater(S.form);
  patchCalcBoxes();
}

function patchCalcBoxes() {
  const f = S.form;
  const pozo = S.pozo;
  const tankCalcs = f.tanks.map(tk => calcTanque(tk));

  let totalBph = 0, totalBpd = 0, totalNetos = 0, totalDilDia = 0;
  if (f.sumar) {
    tankCalcs.forEach(c => { totalBph += c.bph; totalBpd += c.bpd; totalNetos += c.netos; totalDilDia += c.dilDia; });
  } else {
    totalBph = tankCalcs[0]?.bph || 0;
    totalBpd = tankCalcs[0]?.bpd || 0;
    totalNetos = tankCalcs[0]?.netos || 0;
    totalDilDia = tankCalcs[0]?.dilDia || 0;
  }

  const ga = calcAGA3(f);

  // Actualizar cajas de cálculo por ID
  const patch = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
  patch('rc-bph',   fmt(totalBph));
  patch('rc-bpd',   fmt(totalBpd));
  patch('rc-netos', fmt(totalNetos));
  patch('rc-dif',   fmt(tankCalcs[0]?.dif, 1));
  patch('rc-dil',   fmt(totalDilDia));
  patch('rc-qg',    fmt(ga.qg, 2));

  // Título del panel de cálculo
  const titleEl = document.getElementById('rc-title');
  if (titleEl) {
    titleEl.textContent = '⚡ Cálculo en Tiempo Real' +
      (f.tanks.length > 1 ? (f.sumar ? ' — Suma de ' + f.tanks.length + ' tanques' : ' — Tanque 1') : '');
  }

  // Badge BPH por tanque
  tankCalcs.forEach((c, i) => patch('rc-tank-bph-' + i, 'BPH: ' + fmt(c.bph)));

  // Fila de suma total (si hay >1 tanque)
  patch('rc-sum-bruto', fmt(totalBpd));
  patch('rc-sum-netos', fmt(totalNetos));

  // Alertas — reconstruir solo el banner de alertas
  const alertsEl = document.getElementById('rc-alerts');
  if (alertsEl) {
    alertsEl.innerHTML = '';
    const al = checkAl(f.pCab, S.pozo);
    if (al.length) {
      const built = alerts(al);
      if (built) alertsEl.appendChild(built);
    }
  }

  // Actualizar color del campo P.Cabezal si cruza umbral
  const pCabInput = document.getElementById('rc-pcab-input');
  if (pCabInput) {
    const over = san(f.pCab) > san(S.pozo.limResorte) && f.pCab !== '';
    pCabInput.classList.toggle('inp-alert', over);
  }

  // Actualizar color del campo Diferencial Barton en AGA-3
  const hwInput = document.getElementById('rc-hw-input');
  if (hwInput) {
    const over = san(f.hw) > san(S.pozo.limGamma) && f.hw !== '';
    hwInput.classList.toggle('inp-alert', over);
  }
  // Actualizar hint y alerta de Meter Run (β)
  const mrInput = document.getElementById('rc-mr-input');
  const mrHint  = document.getElementById('rc-mr-hint');
  if (mrInput) {
    const mrBad = san(f.meterRun) > 0 && san(f.diam) >= san(f.meterRun);
    mrInput.classList.toggle('inp-alert', mrBad);
  }
  if (mrHint && san(f.meterRun) > 0 && san(f.diam) > 0) {
    const gaR = calcAGA3(f);
    const betaOver = san(gaR.beta) > 0.75;
    mrHint.textContent = 'β = ' + gaR.beta + (betaOver ? ' ⚠️ > 0.75 (AGA-3 límite)' : ' ✓') + '  ·  Fc = ' + gaR.Fc;
    mrHint.style.color = betaOver ? '#f87171' : '#4b5563';
  }

  // Toggle de suma — actualizar texto y estilo
  const togBtn = document.getElementById('rc-tog-btn');
  if (togBtn) {
    togBtn.textContent = f.sumar ? '∑ Totalizando todos los tanques' : 'Ver solo Tanque 1';
    togBtn.style.background = f.sumar ? 'rgba(245,158,11,.2)' : '#1f2937';
    togBtn.style.border = '1px solid ' + (f.sumar ? 'rgba(245,158,11,.4)' : '#374151');
    togBtn.style.color = f.sumar ? '#f59e0b' : '#6b7280';
  }

  // Botón guardar — actualizar hora
  const saveBtn = document.getElementById('rc-save-btn');
  if (saveBtn) saveBtn.textContent = '✓ Guardar Lectura Hora ' + (S.lecturas.length + 1);
}

function switchTab(newTab) {
  S.tab = newTab;
  // Actualizar estilos de tabs
  ['tanque', 'gas', 'oper'].forEach(k => {
    const btn = document.getElementById('rc-tab-' + k);
    if (btn) { btn.className = 'tab' + (k === newTab ? ' on' : ''); }
  });
  // Reemplazar solo el contenido de la pestaña
  const contentEl = document.getElementById('rc-tab-content');
  if (contentEl) {
    contentEl.innerHTML = '';
    contentEl.appendChild(buildTabContent(newTab));
  }
}

    const tgInp = e('input', {
      cls: 'inp', type: 'text', value: f.tGas || '', placeholder: '60',

    ap(tgRow, tgInp, e('span', { style: 'position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:11px;color:#6b7280;pointer-events:none', html: '°F' }));

    const mrLabel = e('div', { style: 'display:flex;align-items:center;gap:6px;margin-bottom:4px' });
    ap(mrLabel,
      e('label', { cls: 'lbl', style: 'margin-bottom:0', html: 'Meter Run (D)' }),
      e('span', {
        style: 'font-size:9px;font-weight:700;padding:1px 6px;border-radius:99px;background:rgba(139,92,246,.15);color:#a78bfa;border:1px solid rgba(139,92,246,.25);cursor:help',
        html: 'AGA-3',
        title: 'Diámetro interno real del tubo de medición (Ø nominal ≠ Ø real). AGA-3 / API 14.3 — sección 3. Varía según cédula y mantenimiento.'
      })
    );
    ap(mrW, mrLabel);
    const mrRow = e('div', { style: 'position:relative' });
    const betaNow = calcAGA3(f);
    const mrAlert = san(f.meterRun) > 0 && san(f.diam) >= san(f.meterRun);
    const mrInp = e('input', {
      id: 'rc-mr-input',
      cls: 'inp' + (mrAlert ? ' inp-alert' : ''),
      type: 'text', value: f.meterRun || '', placeholder: 'ej: 4.026',
      input: ev => setForm(prev => ({ ...prev, meterRun: ev.target.value }))
    });
    ap(mrRow, mrInp, e('span', { style: 'position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:11px;color:#6b7280;pointer-events:none', html: 'pulg' }));
    const betaHint = san(f.meterRun) > 0 && san(f.diam) > 0
      ? 'β = ' + betaNow.beta + (san(betaNow.beta) > 0.75 ? ' ⚠️ > 0.75 (AGA-3 límite)' : '') + ' · Se mantiene entre horas'
      : 'D interno real (cédula/mantenimiento) · Se mantiene entre horas';
    ap(mrW, mrRow,
      e('span', { id: 'rc-mr-hint', style: 'font-size:10px;color:#4b5563;margin-top:3px;display:block', html: betaHint })
    );
    ap(g2c, mrW);
    ap(card, g2c);

    // Factores calculados (actualizables via patchCalcBoxes si se añaden IDs)
    const resBox = e('div', { style: 'background:rgba(255,255,255,.02);border:1px solid #1f2937;border-radius:10px;padding:14px;margin-top:14px' });
    ap(resBox, e('div', { style: 'font-size:10px;color:#6b7280;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px', html: 'Factores AGA-3 calculados' }));
    const fg3 = e('div', { cls: 'g3', style: 'gap:8px;margin-bottom:10px' });
    const ga_now = calcAGA3(f);
    const factorsToShow = san(f.meterRun)>0 ? [['Fb',ga_now.Fb],['Fg',ga_now.Fg],['Ftf',ga_now.Ftf],['β',ga_now.beta],['Fc',ga_now.Fc]] : [['Fb',ga_now.Fb],['Fg',ga_now.Fg],['Ftf',ga_now.Ftf]];
    factorsToShow.forEach(([k, v]) => {
      const b = e('div', { style: 'text-align:center;background:#1a2235;border-radius:8px;padding:8px' });
      ap(b, e('div', { style: 'font-size:10px;color:#6b7280', html: k }), e('div', { style: 'font-size:13px;font-family:monospace;color:#94a3b8;font-weight:600', id: 'rc-aga-' + k.toLowerCase(), html: v }));
      ap(fg3, b);
    });
    ap(resBox, fg3);
    const qgRow = e('div', { style: 'display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid #1f2937' });
    ap(qgRow, e('span', { style: 'font-size:12px;color:#9ca3af;font-weight:600', html: 'Qg (MPCGD)' }), e('span', { id: 'rc-qg-big', style: 'font-size:22px;font-family:monospace;font-weight:700;color:#f59e0b', html: fmt(ga_now.qg, 2) }));
    ap(resBox, qgRow);
    ap(card, resBox);
    frag.appendChild(card);
  } // end tab gas

  // ── TAB OPERATIVOS ────────────────────────────────────────────────
  if (tab === 'oper') {
    const card = e('div', { cls: 'card' });
    ap(card, sectionHdr('⚙️', 'Parámetros Operativos', 'Se borran al guardar cada hora'));

    const pCabAlert = san(f.pCab) > san(S.pozo.limResorte) && f.pCab !== '';
    const g2 = e('div', { cls: 'g2' });
    // P. Cabezal con ID para patch
    const pcW = e('div');
    ap(pcW, e('label', { cls: 'lbl', html: 'Presión Cabezal' }));
    const pcRow = e('div', { style: 'position:relative' });
    const pcInp = e('input', {
      id: 'rc-pcab-input',
      cls: 'inp' + (pCabAlert ? ' inp-alert' : ''),
      type: 'text', value: f.pCab || '', placeholder: '0',
      input: ev => setForm(prev => ({ ...prev, pCab: ev.target.value }))
    });
    ap(pcRow, pcInp, e('span', { style: 'position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:11px;color:#6b7280;pointer-events:none', html: 'psi' }));
    ap(pcW, pcRow, e('span', { style: 'font-size:10px;color:#4b5563;margin-top:3px;display:block', html: 'Resorte máx: ' + (S.pozo.limResorte || '—') + ' psi' }));
    ap(g2, pcW);
    // P. Separación
    const psW = e('div');
    ap(psW, e('label', { cls: 'lbl', html: 'Presión Separación' }));
    const psRow = e('div', { style: 'position:relative' });
    const psInp = e('input', {
      cls: 'inp', type: 'text', value: f.pSep || '', placeholder: '0',
      input: ev => setForm(prev => ({ ...prev, pSep: ev.target.value }))
    });
    ap(psRow, psInp, e('span', { style: 'position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:11px;color:#6b7280;pointer-events:none', html: 'psi' }));
    ap(psW, psRow);
    ap(g2, psW);
    ap(card, g2);
    ap(card, e('div', { style: 'height:10px' }));

    const g3 = e('div', { cls: 'g3' });
    [['Torque', 'torque', ''], ['RPM', 'rpm', ''], ['Amperaje', 'amp', 'A']].forEach(([lbl, key, unit]) => {
      const w = e('div');
      ap(w, e('label', { cls: 'lbl', html: lbl }));
      const row = e('div', { style: 'position:relative' });
      const inp = e('input', {
        cls: 'inp', type: 'text', value: f[key] || '', placeholder: '0',
        input: ev => setForm(prev => ({ ...prev, [key]: ev.target.value }))
      });
      ap(row, inp);
      if (unit) ap(row, e('span', { style: 'position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:11px;color:#6b7280;pointer-events:none', html: unit }));
      ap(w, row);
      ap(g3, w);
    });
    ap(card, g3);

    ap(card, divider());
    const alInfo = e('div', { style: 'background:#0f1520;border:1px solid #1f2937;border-radius:10px;padding:12px' });
    ap(alInfo, e('div', { style: 'font-size:10px;color:#6b7280;font-weight:700;text-transform:uppercase;margin-bottom:8px', html: 'Límites configurados para este pozo' }));
    const alg = e('div', { cls: 'g2' });
    const r1 = e('div', { style: 'background:#1a2235;border-radius:8px;padding:8px' });
    ap(r1, e('div', { style: 'font-size:10px;color:#6b7280', html: 'Resorte (psi)' }), e('div', { style: 'font-size:14px;font-family:monospace;font-weight:700;color:' + (pCabAlert ? '#f87171' : '#e2e8f0'), html: S.pozo.limResorte || '—' }));
    const r2 = e('div', { style: 'background:#1a2235;border-radius:8px;padding:8px' });
    ap(r2, e('div', { style: 'font-size:10px;color:#6b7280', html: 'Gamma (inH₂O)' }), e('div', { style: 'font-size:14px;font-family:monospace;font-weight:700;color:#e2e8f0', html: S.pozo.limGamma || '—' }));
    ap(alg, r1, r2);
    ap(alInfo, alg);
    ap(card, alInfo);
    frag.appendChild(card);
  } // end tab oper

  return frag;
}

function buildRegistro() {
  const sc = e('div', { cls: 'screen active' });
  const wrap = e('div', { cls: 'wrap' });
  const f = S.form;
  const pozo = S.pozo;
  const hora = S.lecturas.length + 1;
  const tankCalcs = f.tanks.map(tk => calcTanque(tk));
  let totalBph = 0, totalBpd = 0, totalNetos = 0, totalDilDia = 0;
  if (f.sumar) { tankCalcs.forEach(c => { totalBph += c.bph; totalBpd += c.bpd; totalNetos += c.netos; totalDilDia += c.dilDia; }); }
  else { totalBph = tankCalcs[0]?.bph || 0; totalBpd = tankCalcs[0]?.bpd || 0; totalNetos = tankCalcs[0]?.netos || 0; totalDilDia = tankCalcs[0]?.dilDia || 0; }
  const ga = calcAGA3(f);

  // Topbar
  const rBtn = e('button', { cls: 'btn btn-s', style: 'padding:6px 12px;font-size:12px;width:auto', html: S.lecturas.length + ' lect →', click: () => go('TABLA') });
  ap(wrap, topbar(pozo.nombre || pozo.id || 'Pozo', pozo.campo + ' · ' + pozo.zona + ' · Hora ' + hora, () => go('DASHBOARD'), rBtn));

  // Alert banner — contenedor con ID para patch quirúrgico
  const alertsWrap = e('div', { id: 'rc-alerts' });
  const al = checkAl(f.pCab, pozo);
  if (al.length) { const alEl = alerts(al); if (alEl) ap(alertsWrap, alEl); }
  ap(wrap, alertsWrap);

  // Live calc panel
  const liveCard = e('div', { cls: 'card-hl' });
  const liveTitle = e('div', {
    id: 'rc-title',
    style: 'font-size:10px;color:rgba(245,158,11,.7);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px',
    html: '⚡ Cálculo en Tiempo Real' + (f.tanks.length > 1 ? (f.sumar ? ' — Suma de ' + f.tanks.length + ' tanques' : ' — Tanque 1') : '')
  });
  ap(liveCard, liveTitle);

  const lg3 = e('div', { cls: 'g3', style: 'margin-bottom:10px' });
  // Calc boxes con IDs estables
  function calcBox(id, label, val, unit, hl, dim) {
    const d = e('div', { cls: 'cbox' + (hl ? ' cbox-hl' : '') });
    ap(d, e('div', { style: 'font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px', html: label }));
    ap(d, e('div', { id: id, cls: 'v' + (hl ? ' v-hl' : dim ? ' v-dim' : ''), html: val }));
    if (unit) ap(d, e('div', { cls: 'unit', html: unit }));
    return d;
  }
  ap(lg3,
    calcBox('rc-bph',   'BPH',       fmt(totalBph),  'Bls/H', false, false),
    calcBox('rc-bpd',   'BPD Bruto', fmt(totalBpd),  'Bls/D', false, false),
    calcBox('rc-netos', 'Netos/Día', fmt(totalNetos), 'Bls/D', true,  false)
  );
  ap(liveCard, lg3);
  const lg3b = e('div', { cls: 'g3' });
  ap(lg3b,
    calcBox('rc-dif', 'Dif. Nivel', fmt(tankCalcs[0]?.dif, 1), 'pulg',  false, true),
    calcBox('rc-dil', 'Diluyente',  fmt(totalDilDia),           'Bls/D', false, true),
    calcBox('rc-qg',  'Qg',         fmt(ga.qg, 2),              'MPCGD', false, true)
  );
  ap(liveCard, lg3b);

  // Toggle sumar (si >1 tanque)
  if (f.tanks.length > 1) {
    const togWrap = e('div', { style: 'margin-top:12px;display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid rgba(245,158,11,.15)' });
    const togBtn = e('button', {
      id: 'rc-tog-btn',
      style: 'background:' + (f.sumar ? 'rgba(245,158,11,.2)' : '#1f2937') + ';border:1px solid ' + (f.sumar ? 'rgba(245,158,11,.4)' : '#374151') + ';border-radius:8px;padding:6px 14px;color:' + (f.sumar ? '#f59e0b' : '#6b7280') + ';font-size:11px;font-weight:700;cursor:pointer',
      html: f.sumar ? '∑ Totalizando todos los tanques' : 'Ver solo Tanque 1',
      click: () => {
        setForm(prev => ({ ...prev, sumar: !prev.sumar }));
      }
    });
    ap(togWrap, togBtn);
    ap(liveCard, togWrap);
  }
  ap(wrap, liveCard);

  // Tab bar — botones con IDs para cambio de clase sin re-render
  const tabBar = e('div', { cls: 'tabs' });
  [['tanque', '🛢️ Tanques'], ['gas', '🔥 Gas AGA-3'], ['oper', '⚙️ Operativos']].forEach(([k, l]) => {
    const btn = e('button', {
      id: 'rc-tab-' + k,
      cls: 'tab' + (S.tab === k ? ' on' : ''),
      html: l,
      click: () => switchTab(k)
    });
    ap(tabBar, btn);
  });
  ap(wrap, tabBar);

  // Contenedor del contenido de pestaña — único nodo que se reemplaza al cambiar tab
  const tabContent = e('div', { id: 'rc-tab-content' });
  tabContent.appendChild(buildTabContent(S.tab));
  ap(wrap, tabContent);

  // Botón guardar
  const saveBtn = e('button', {
    id: 'rc-save-btn',
    cls: 'btn btn-g',
    style: 'margin-top:14px',
    html: '✓ Guardar Lectura Hora ' + hora,
    click: () => {
      const tcs = S.form.tanks.map(tk => calcTanque(tk));
      let bph = 0, bpd = 0, netos = 0;
      if (S.form.sumar) { tcs.forEach(c => { bph += c.bph; bpd += c.bpd; netos += c.netos; }); }
      else { bph = tcs[0]?.bph || 0; bpd = tcs[0]?.bpd || 0; netos = tcs[0]?.netos || 0; }
      const gaRes = calcAGA3(S.form);
      const newLect = {
        id: Date.now(), h: S.lecturas.length + 1,
        ts: new Date().toLocaleTimeString('es-VE', { hour: '2-digit', minute: '2-digit' }),
        bph, bpd, netos, pCab: san(S.form.pCab), qg: gaRes.qg, als: []
      };
      // Persistencia: mf → mi, limpiar campos por hora
      const newTanks = S.form.tanks.map((tk) => ({
        ...tk,
        mi: tk.mf || tk.mi,
        mf: '', factorEspuma: '0', th: '1',
      }));
      set({
        lecturas: [...S.lecturas, newLect],
        form: {
          ...S.form, tanks: newTanks,
          pCab: '', pSep: '', torque: '', rpm: '', amp: '',
          pf: '', hw: '', tGas: '',
        }
      });
    }
  });
  ap(wrap, saveBtn);
  ap(sc, wrap);
  return sc;
}

function buildTabla(){
  const sc=e('div',{cls:'screen active'});
  const wrap=e('div',{cls:'wrap'});
  const all=S.lecturas.length?S.lecturas:LECT_DEMO;
  const avg=(arr,k)=>arr.reduce((s,l)=>s+l[k],0)/arr.length;
  const prom={bph:avg(all,'bph'),bpd:avg(all,'bpd'),netos:avg(all,'netos'),qg:avg(all,'qg')};
  const maxN=Math.max(...all.map(l=>l.netos));
  const minN=Math.min(...all.map(l=>l.netos));

  const rBdg=statusBadge('EN_CURSO');
  ap(wrap,topbar(S.pozo.nombre+' — Lecturas',all.length+' registros · Proyección 24H',()=>go('REGISTRO'),rBdg));

  const liveCard=e('div',{cls:'card-hl'});
  ap(liveCard,e('div',{style:'font-size:10px;color:rgba(245,158,11,.7);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px',html:'Proyección 24H — Promedio Acumulado'}));
  const pg2=e('div',{cls:'g2',style:'margin-bottom:10px'});
  ap(pg2,cbox('Bruto/Día',fmt(prom.bpd),'Bls/D'),cbox('Netos/Día',fmt(prom.netos),'Bls/D',true));
  ap(liveCard,pg2);
  const pg3=e('div',{cls:'g3'});
  ap(pg3,cbox('BPH Prom.',fmt(prom.bph),'Bls/H',false,true),cbox('Gas Prom.',fmt(prom.qg,2),'MPCGD',false,true),cbox('Horas eval.',all.length,'H',false,true));
  ap(liveCard,pg3);ap(wrap,liveCard);

  // Chart
  const chartCard=e('div',{cls:'card'});
  ap(chartCard,e('div',{style:'font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px',html:'Tendencia Netos/Día por Hora'}));
  const chartWrap=e('div',{style:'display:flex;align-items:flex-end;gap:4px;height:64px'});
  all.forEach(l=>{
    const pct=maxN>0?(l.netos/maxN)*100:0;
    const col=e('div',{style:'flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end'});
    ap(col,e('div',{cls:'bar',style:'width:100%;height:'+pct+'%'}),e('span',{style:'font-size:10px;color:#4b5563',html:l.h}));
    ap(chartWrap,col);
  });
  ap(chartCard,chartWrap);
  const chartFoot=e('div',{style:'display:flex;justify-content:space-between;margin-top:4px;font-size:10px;color:#4b5563'});
  ap(chartFoot,e('span',{html:'Mín: '+fmt(minN)}),e('span',{html:'Máx: '+fmt(maxN)}));
  ap(chartCard,chartFoot);ap(wrap,chartCard);

  // Tabla
  const tableCard=e('div',{cls:'card',style:'overflow:hidden;padding:0'});
  const thead=e('div',{style:'display:grid;grid-template-columns:1fr 1.2fr 1.2fr 1.3fr .6fr;background:#1a2235;padding:8px 14px;font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.06em'});
  ['H','BPH','P.Cab','Netos','⚠'].forEach(h=>ap(thead,e('span',{html:h})));
  ap(tableCard,thead);
  all.forEach((l,i)=>{
    const row=e('div',{style:'display:grid;grid-template-columns:1fr 1.2fr 1.2fr 1.3fr .6fr;border-top:1px solid #1f2937;padding:10px 14px;background:'+(i%2?'rgba(255,255,255,.01)':'transparent')});
    ap(row,
      e('span',{style:'font-family:monospace;font-size:12px;color:#6b7280',html:l.h+'H'}),
      e('span',{style:'font-family:monospace;font-size:12px;color:#e2e8f0',html:fmt(l.bph)}),
      e('span',{style:'font-family:monospace;font-size:12px;color:#e2e8f0',html:l.pCab}),
      e('span',{style:'font-family:monospace;font-size:13px;font-weight:700;color:#f59e0b',html:fmt(l.netos)}),
      e('span',{style:'font-size:14px',html:l.als?.length?'🚨':'<span style="color:#10b981">✓</span>'})
    );ap(tableCard,row);
  });
  ap(wrap,tableCard);

  const btnRow=e('div',{cls:'g2',style:'gap:10px;margin-top:4px'});
  const b1=e('button',{cls:'btn btn-s',html:'+ Nueva Lectura',click:()=>go('REGISTRO')});
  const b2=e('button',{cls:'btn btn-p',html:'Cerrar y Reportar →',click:()=>go('REPORTE')});
  ap(btnRow,b1,b2);ap(wrap,btnRow);
  ap(sc,wrap);return sc;
}

function buildReporte(){
  const sc=e('div',{cls:'screen active'});
  const wrap=e('div',{cls:'wrap'});
  const all=S.lecturas.length?S.lecturas:LECT_DEMO;
  const avg=(arr,k)=>arr.reduce((s,l)=>s+l[k],0)/arr.length;
  const res={bpd:avg(all,'bpd'),netos:avg(all,'netos'),qg:avg(all,'qg'),dilDia:25.20,aysPct:2.4,aysBls:avg(all,'bpd')*0.024,hrs:all.length};

  ap(wrap,topbar('Reporte — '+S.pozo.nombre,'Pendiente de aprobación',()=>go('TABLA')));

  // Resumen
  const sumCard=e('div',{style:'background:rgba(5,150,105,.08);border:1px solid rgba(16,185,129,.3);border-radius:16px;padding:16px;margin-bottom:14px'});
  const sumHdr=e('div',{style:'display:flex;align-items:center;gap:8px;margin-bottom:14px'});
  ap(sumHdr,e('span',{style:'width:8px;height:8px;border-radius:50%;background:#10b981;display:inline-block'}),e('span',{style:'font-size:11px;color:#34d399;font-weight:700;text-transform:uppercase;letter-spacing:.06em',html:'Evaluación Completada'}));
  ap(sumCard,sumHdr);
  const sg2=e('div',{cls:'g2',style:'margin-bottom:10px'});
  ap(sg2,cbox('BBruto/Día',fmt(res.bpd),'Bls/D'),cbox('Netos/Día',fmt(res.netos),'Bls/D',true));
  ap(sumCard,sg2);
  const sg3=e('div',{cls:'g3'});
  ap(sg3,cbox('AyS '+fmt(res.aysPct,1)+'%',fmt(res.aysBls),'Bls/D',false,true),cbox('Diluyente',fmt(res.dilDia),'Bls/D',false,true),cbox('Gas Qg',fmt(res.qg,2),'MPCGD',false,true));
  ap(sumCard,sg3);ap(wrap,sumCard);

  // Aprobación
  const apCard=e('div',{cls:'card'});
  ap(apCard,e('div',{style:'font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;font-weight:700',html:'Flujo de Aprobación'}));
  const pasos=[
    {rol:'Operador',icon:'✓',tipo:'done',desc:'Carlos Pérez · '+new Date().toLocaleTimeString('es-VE',{hour:'2-digit',minute:'2-digit'})},
    {rol:'Supervisor de Campo',icon:'⏳',tipo:'wait',desc:'En espera de revisión'},
    {rol:'Supervisor Mayor / Coordinador',icon:'🔒',tipo:'lock',desc:'Requiere aprobación previa'},
    {rol:'Gerente',icon:'🔒',tipo:'lock',desc:'Aprobación final — reporte oficial'},
  ];
  pasos.forEach((p,i)=>{
    const row=e('div',{style:'display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;'+(i<pasos.length-1?'margin-bottom:10px;':'')+'background:'+(p.tipo==='done'?'rgba(5,150,105,.1)':p.tipo==='wait'?'rgba(245,158,11,.06)':'rgba(255,255,255,.01)')+';border:1px solid '+(p.tipo==='done'?'rgba(16,185,129,.3)':p.tipo==='wait'?'rgba(245,158,11,.2)':'#1f2937')});
    const ico=e('div',{cls:'step-'+p.tipo,html:p.icon});
    const info=e('div',{style:'flex:1'});
    ap(info,e('div',{style:'font-size:13px;font-weight:600;color:'+(p.tipo==='lock'?'#4b5563':'#e2e8f0'),html:p.rol}),e('div',{style:'font-size:11px;color:#6b7280;margin-top:2px',html:p.desc}));
    const bdg=badge(p.tipo==='done'?'COMPLETO':p.tipo==='wait'?'PENDIENTE':'BLOQUEADO',p.tipo==='done'?'g':p.tipo==='wait'?'a':'gray');
    ap(row,ico,info,bdg);ap(apCard,row);
  });
  ap(wrap,apCard);

  // WA
  const waCard=e('div',{cls:'card'});
  ap(waCard,e('div',{style:'font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;font-weight:700',html:'Reporte Flash — WhatsApp'}));
  const waTxt=`📊 REPORTE WELL TESTING — ${S.pozo.nombre}\n🏭 Campo: ${S.pozo.campo} | Zona: ${S.pozo.zona}\n\n• BBruto/Día:  ${fmt(res.bpd)} Bls\n• Diluyente:   ${fmt(res.dilDia)} Bls/D\n• AyS (${fmt(res.aysPct,1)}%):  ${fmt(res.aysBls)} Bls\n• Netos/Día:   ${fmt(res.netos)} Bls ✅\n• Gas Qg:      ${fmt(res.qg,2)} MPCGD\n\nLecturas: ${res.hrs}H | Operador: Carlos Pérez\nEstado: PENDIENTE APROBACIÓN SUPERVISOR`;
  ap(waCard,e('div',{cls:'wa',html:waTxt.replace(/\n/g,'<br>')}));
  const waLink=e('a',{href:'https://wa.me/?text='+encodeURIComponent(waTxt),target:'_blank',rel:'noopener noreferrer',style:'text-decoration:none;display:block'});
  const waBtn=e('button',{cls:'btn btn-g',html:'📱 Enviar por WhatsApp'});
  ap(waLink,waBtn);ap(waCard,waLink);ap(wrap,waCard);

  ap(wrap,e('div',{style:'text-align:center;font-size:11px;color:#374151;padding-bottom:16px;margin-top:4px',html:'PDF y XLSX disponibles en panel del Supervisor'}));
  ap(sc,wrap);return sc;
}

  ap(roleHdr,e('div',{style:'font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px',html:'Ingresar como'}));
  const roleGrid=e('div',{style:'display:grid;grid-template-columns:1fr 1fr;gap:8px'});
  ['SUP_CAMPO','SUP_MAYOR','COORDINADOR','GERENTE'].forEach(rol=>{
    const isSelected = SS.supUser.rol===rol;
    const btn=e('button',{
      style:'padding:8px 10px;border-radius:8px;border:1px solid '+(isSelected?ROL_COLOR[rol]:'#2d3748')+';background:'+(isSelected?`rgba(${rol==='SUP_CAMPO'?'59,130,246':rol==='SUP_MAYOR'?'139,92,246':rol==='COORDINADOR'?'245,158,11':'239,68,68'},.12)`:'#1a2235')+';color:'+(isSelected?ROL_COLOR[rol]:'#6b7280')+';font-size:11px;font-weight:700;cursor:pointer;text-align:left',
      html:'<div style="font-size:14px;margin-bottom:3px">'+(rol==='SUP_CAMPO'?'👷':rol==='SUP_MAYOR'?'🧑‍💼':rol==='COORDINADOR'?'📋':'🏛️')+'</div>'+ROL_LABEL[rol],
      click:()=>{ SS={...SS,supUser:{...SS.supUser,rol}}; goSup('SUP_LOGIN'); }
    });
    ap(roleGrid,btn);
  });
  ap(roleHdr,roleGrid);

  const emailLbl=e('label',{cls:'lbl',html:'Correo electrónico'});
  const emailInp=e('input',{cls:'inp',type:'email',value:'supervisora@arco.com'});
  const passLbl=e('label',{cls:'lbl',html:'Contraseña',style:'display:block;margin-top:12px'});
  const passInp=e('input',{cls:'inp',type:'password',placeholder:'••••••••'});

  const loginBtn=e('button',{cls:'btn btn-p',style:'margin-top:14px;background:linear-gradient(135deg,#7c3aed,#4f46e5)',
    html:'Acceder como '+ROL_LABEL[SS.supUser.rol]+' →',
    click:()=>{
      loginBtn.innerHTML='Verificando...';loginBtn.disabled=true;
      setTimeout(()=>goSup('SUP_DASH'),600);
    }
  });
  ap(card,roleHdr,emailLbl,emailInp,passLbl,passInp,loginBtn);

  const switchLink=e('div',{style:'margin-top:16px;text-align:center'});
  ap(switchLink,e('button',{style:'background:none;border:none;color:#4b5563;font-size:12px;cursor:pointer',
    html:'← Acceso Operador de Campo',
    click:()=>go('LOGIN')
  }));

  ap(inner,logoWrap,card,switchLink);ap(wrap,inner);ap(sc,wrap);return sc;
}

// ═══════════════════════════════════════════════════
// SUP NUEVO POZO
// ═══════════════════════════════════════════════════
function buildSupNuevoPozo(){
  const sc=e('div',{cls:'screen active'});
  const wrap=e('div',{cls:'wrap'});
  ap(wrap,topbar('Nuevo Pozo','Configuración completa',()=>goSup('SUP_DASH')));

  let nd=SS.nuevoPozoSup;
  function syncP(k,v){SS.nuevoPozoSup={...SS.nuevoPozoSup,[k]:v};nd=SS.nuevoPozoSup;rebuildBody();}
  function syncT(idx,k,v){const ts=[...SS.nuevoPozoSup.tanques];ts[idx]={...ts[idx],[k]:v};SS.nuevoPozoSup={...SS.nuevoPozoSup,tanques:ts};nd=SS.nuevoPozoSup;rebuildBody();}

  function rebuildBody(){
    const old=document.getElementById('sup-nuevo-body');
    if(old)old.replaceWith(buildBody());
  }

  function buildBody(){
    const body=e('div',{id:'sup-nuevo-body'});

    // Rol badge
    const rb=e('div',{style:'background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2);border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:8px'});
    ap(rb,e('span',{html:'🛡️'}),e('div',{style:'font-size:11px;color:#a78bfa;font-weight:600',html:ROL_LABEL[SS.supUser.rol]+' — Configuración de Pozo'}));
    ap(body,rb);

    // Identificación
    const c1=e('div',{cls:'card'});
    ap(c1,sectionHdr('🏗️','Identificación del Pozo'));
    ap(c1,field('Nombre del Pozo',nd.nombre,v=>syncP('nombre',v),{hint:'Ej: MFB-1025'}));
    ap(c1,e('div',{style:'height:10px'}));
    const g1=e('div',{cls:'g2'});
    ap(g1,field('Campo',nd.campo,v=>syncP('campo',v),{hint:'Ej: Bare, Norte'}));
    const zw=e('div');
    ap(zw,e('label',{cls:'lbl',html:'Zona'}));
    const zs=e('select',{cls:'inp',change:ev=>syncP('zona',ev.target.value)});
    ['FAJA','MONAGAS'].forEach(z=>{const o=e('option',{value:z,html:z});if(nd.zona===z)o.selected=true;ap(zs,o);});
    ap(zw,zs);ap(g1,zw);ap(c1,g1);ap(body,c1);

    // Parámetros
    const c2=e('div',{cls:'card'});
    ap(c2,sectionHdr('🛢️','Parámetros del Tanque'));
    const g2=e('div',{cls:'g2'});
    // factor now lives per-tank (see below)
    ap(g2,field('Horas de Evaluación',nd.horas,v=>syncP('horas',v),{unit:'H'}));
    ap(c2,g2);ap(body,c2);

    // Tanques
    const c3=e('div',{cls:'card'});
    ap(c3,sectionHdr('🪣','Tanques y Medida Inicial',nd.tanques.length+' tanque(s)'));
    ap(c3,e('div',{style:'font-size:11px;color:#6b7280;margin-bottom:12px',html:'La medida inicial refleja el remanente o intransegable previo a la operación.'}));
    nd.tanques.forEach((t,idx)=>{
      const tb=e('div',{cls:'tank-block'});
      const th=e('div',{cls:'tank-hdr'});
      ap(th,e('div',{style:'font-size:12px;font-weight:700;color:#e2e8f0',html:'🪣 '+t.nombre}));
      if(nd.tanques.length>1){
        const db=e('button',{cls:'btn-r',html:'✕',click:()=>{SS.nuevoPozoSup.tanques=SS.nuevoPozoSup.tanques.filter((_,i)=>i!==idx);rebuildBody();}});ap(th,db);
      }
      ap(tb,th);
      const tg=e('div',{cls:'g2'});
      ap(tg,field('Nombre',t.nombre,v=>syncT(idx,'nombre',v)));
      ap(tg,field('Medida Inicial',t.mi,v=>syncT(idx,'mi',v),{unit:'pulg',hint:'Remanente/intransegable'}));
      ap(tb,tg);
      const sFtRow=e('div',{style:'margin-top:8px'});
      ap(sFtRow,field('Factor Tanque (kk)',t.ft||'',v=>syncT(idx,'ft',v),{unit:'BBL/pulg',hint:'Geometría del tanque'}));
      ap(tb,sFtRow);ap(c3,tb);
    });
    const addB=e('button',{cls:'btn-add',html:'+ Agregar Tanque',click:()=>{
      const n=SS.nuevoPozoSup.tanques.length+1;
      const sLastFt=(SS.nuevoPozoSup.tanques[SS.nuevoPozoSup.tanques.length-1]||{}).ft||'2.40';
      SS.nuevoPozoSup.tanques.push({id:'t'+n,nombre:'Tanque '+n,mi:'',ft:sLastFt});rebuildBody();
    }});
    ap(c3,addB);ap(body,c3);

    // Alertas
    const cGasS=e('div',{cls:'card'});
    ap(cGasS,sectionHdr('🔥','Configuración Gas AGA-3'));
    const gMRS=e('div',{cls:'g2'});
    const mrSLbl=e('div',{style:'display:flex;align-items:center;gap:6px;margin-bottom:4px'});
    ap(mrSLbl,e('label',{cls:'lbl',style:'margin-bottom:0',html:'Meter Run (D)'}),e('span',{style:'font-size:9px;font-weight:700;padding:1px 6px;border-radius:99px;background:rgba(139,92,246,.15);color:#a78bfa;border:1px solid rgba(139,92,246,.25)',html:'AGA-3'}));
    ap(gMRS,e('div',{},mrSLbl,e('input',{cls:'inp',type:'text',value:nd.meterRun||'',placeholder:'ej: 4.026',input:ev=>syncP('meterRun',ev.target.value)}),e('span',{style:'font-size:10px;color:#4b5563;margin-top:3px;display:block',html:'Ø interno real del tubo (pulg) · AGA-3 / API 14.3'})));
    ap(gMRS,field('Diámetro Placa (d)',nd.diamOrif||'',v=>syncP('diamOrif',v),{unit:'pulg',hint:'Placa de orificio instalada'}));
    ap(cGasS,gMRS);ap(body,cGasS);

    const c4=e('div',{cls:'card'});
    ap(c4,sectionHdr('⚠️','Límites de Alerta','Resorte y Gamma'));
    const g4=e('div',{cls:'g2'});
    ap(g4,field('Resorte (psi)',nd.limResorte,v=>syncP('limResorte',v),{unit:'psi',hint:'Presión cabezal máxima'}));
    ap(g4,field('Gamma (inH₂O)',nd.limGamma,v=>syncP('limGamma',v),{unit:'inH₂O',hint:'Diferencial Barton máximo'}));
    ap(c4,g4);ap(body,c4);

    // Asignar operador
    const c5=e('div',{cls:'card'});
    ap(c5,sectionHdr('👷','Asignación de Operador'));
    const ow=e('div');
    ap(ow,e('label',{cls:'lbl',html:'Operador Asignado'}));
    const oSel=e('select',{cls:'inp',change:ev=>syncP('operadorAsignado',ev.target.value)});
    const emptyOpt=e('option',{value:'',html:'— Seleccionar operador —'});ap(oSel,emptyOpt);
    SUP_USERS.filter(u=>u.rol==='OPERADOR').forEach(u=>{
      const o=e('option',{value:u.id,html:u.nombre+' ('+u.zona+')'});
      if(nd.operadorAsignado===u.id)o.selected=true;
      ap(oSel,o);
    });
    ap(ow,oSel);ap(c5,ow);ap(body,c5);

    const valid=nd.nombre&&nd.tanques.every(t=>t.mi!==''&&t.ft!=='')&&nd.operadorAsignado;
    const saveBtn=e('button',{cls:'btn btn-p',style:'margin-bottom:8px',
      html:valid?'Guardar Pozo y Asignar Operador →':'Complete todos los campos requeridos',
      disabled:!valid,
      click:()=>{
        alert(`Pozo ${nd.nombre} creado exitosamente.\nOperador asignado: ${SUP_USERS.find(u=>u.id===nd.operadorAsignado)?.nombre}`);
        goSup('SUP_DASH');
      }
    });
    ap(body,saveBtn);
    return body;
  }

  ap(wrap,buildBody());ap(sc,wrap);return sc;
}
