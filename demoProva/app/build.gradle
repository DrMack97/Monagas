plugins {
    id 'application'
}

dependencies {
    // Librería de Firebase
    implementation 'com.google.firebase:firebase-admin:9.2.0'
    // Slf4j evita errores de logs en consola
    implementation 'org.slf4j:slf4j-simple:2.0.7'
}

application {
    // Esto le dice a Gradle qué archivo ejecutar
    mainClass = 'aggData'
}