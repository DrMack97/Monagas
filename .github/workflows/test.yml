# TODO: Workflow de tests en push - Player 3 (Fullstack)
# Paso 1: Trigger en push a cualquier rama
# Paso 2: Instalar dependencias con pnpm
# Paso 3: Ejecutar pnpm test -r
# Entregable: PR no puede mergear si tests fallan
name: Test

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run tests
        run: pnpm test -r
